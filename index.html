<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVS Neural Analyzer Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="main-container">
        <div class="glass-card">
            <div class="header">
                <div class="lang-selector">
                    <span onclick="switchLang('en')" id="l-en" class="active">EN</span>
                    <span onclick="switchLang('ru')" id="l-ru">RU</span>
                </div>
                <h1 id="t-title">IVS ANALYZER</h1>
                <p class="subtitle" id="t-subtitle">Biological Rhythm Computing</p>
            </div>

            <div class="form-group">
                <div class="input-field">
                    <label id="t-flight">Flight Duration</label>
                    <input type="number" id="tf" placeholder="0.0">
                </div>
                <div class="input-field">
                    <label id="t-zones">Time Zones</label>
                    <input type="number" id="tz" placeholder="0">
                </div>
                <div class="input-field">
                    <label id="t-direction">Travel Vector</label>
                    <select id="k">
                        <option value="1" id="t-west">Westbound (Normal)</option>
                        <option value="1.5" id="t-east">Eastbound (Heavy)</option>
                    </select>
                </div>
            </div>

            <button onclick="analyze()" id="t-button" class="analyze-btn">Compute Index</button>

            <div id="result" class="result-box">
                <div class="res-header">
                    <span id="t-res-label">ANALYSIS RESULT</span>
                    <div class="status-dot" id="dot"></div>
                </div>
                <div class="res-value" id="ivsValue">0.00</div>
                <div class="res-status" id="status-name"></div>
                <p class="res-desc" id="info"></p>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'en';
        const dict = {
            en: {
                title: "IVS ANALYZER", subtitle: "Biological Rhythm Computing",
                flight: "Flight Duration", zones: "Time Zones", direction: "Travel Vector",
                west: "Westbound (Normal)", east: "Eastbound (Heavy)",
                button: "Compute Index", resLabel: "ANALYSIS RESULT",
                stable: "Optimal", stableInfo: "Biometric markers within normal range. Adaptation seamless.",
                caution: "Warning", cautionInfo: "Mild metabolic shift. Hydration and light therapy recommended.",
                critical: "Critical", criticalInfo: "Severe circadian disruption. Immediate sleep protocol required."
            },
            ru: {
                title: "IVS АНАЛИЗАТОР", subtitle: "Вычисление биоритмов",
                flight: "Длительность полета", zones: "Часовые пояса", direction: "Вектор пути",
                west: "На Запад (Норма)", east: "На Восток (Тяжело)",
                button: "Рассчитать", resLabel: "РЕЗУЛЬТАТ АНАЛИЗА",
                stable: "Оптимально", stableInfo: "Биоритмы в норме. Адаптация пройдет незаметно.",
                caution: "Внимание", cautionInfo: "Средний сдвиг. Требуется светотерапия и водный баланс.",
                critical: "Критически", criticalInfo: "Тяжелый джетлаг. Необходим строгий протокол восстановления."
            }
        };

        function switchLang(lang) {
            currentLang = lang;
            document.getElementById('l-en').classList.toggle('active', lang === 'en');
            document.getElementById('l-ru').classList.toggle('active', lang === 'ru');
            
            const l = dict[lang];
            document.getElementById('t-title').innerText = l.title;
            document.getElementById('t-subtitle').innerText = l.subtitle;
            document.getElementById('t-flight').innerText = l.flight;
            document.getElementById('t-zones').innerText = l.zones;
            document.getElementById('t-direction').innerText = l.direction;
            document.getElementById('t-west').innerText = l.west;
            document.getElementById('t-east').innerText = l.east;
            document.getElementById('t-button').innerText = l.button;
            document.getElementById('t-res-label').innerText = l.resLabel;

            if(document.getElementById('result').classList.contains('show')) analyze();
        }

        function analyze() {
            const tf = parseFloat(document.getElementById('tf').value);
            const tz = parseFloat(document.getElementById('tz').value);
            const k = parseFloat(document.getElementById('k').value);
            if (!tf || isNaN(tz)) return;

            const ivs = (k * (tz / tf)).toFixed(2);
            const resBox = document.getElementById('result');
            const val = document.getElementById('ivsValue');
            const stName = document.getElementById('status-name');
            const info = document.getElementById('info');
            const dot = document.getElementById('dot');
            const l = dict[currentLang];

            resBox.classList.add('show');
            val.innerText = ivs;

            if (ivs < 0.7) {
                val.style.color = "#00ff88"; stName.innerText = l.stable; info.innerText = l.stableInfo; dot.style.background = "#00ff88";
            } else if (ivs <= 1.0) {
                val.style.color = "#ffcc00"; stName.innerText = l.caution; info.innerText = l.cautionInfo; dot.style.background = "#ffcc00";
            } else {
                val.style.color = "#ff4444"; stName.innerText = l.critical; info.innerText = l.criticalInfo; dot.style.background = "#ff4444";
            }
        }
    </script>
</body>
</html>
