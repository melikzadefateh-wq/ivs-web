<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IVS Neural Analyzer Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient background -->
  <div class="scene">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="noise"></div>
  </div>

  <main class="shell">
    <div class="card">

      <!-- Language toggle -->
      <div class="lang-bar">
        <button class="lang-btn active" id="btn-en" onclick="switchLang('en')">EN</button>
        <span class="lang-divider"></span>
        <button class="lang-btn" id="btn-ru" onclick="switchLang('ru')">RU</button>
      </div>

      <!-- Header -->
      <header class="card-header">
        <p class="eyebrow" id="t-subtitle">Biological Rhythm Computing</p>
        <h1 class="wordmark" id="t-title">IVS ANALYZER</h1>
      </header>

      <!-- Inputs -->
      <div class="inputs">

        <div class="field">
          <label class="field-label" id="t-flight">Flight Duration</label>
          <div class="field-wrap">
            <input class="field-input" id="tf" type="number" placeholder="0.0" min="0" step="0.1" />
            <span class="field-unit" id="t-hours">hrs</span>
          </div>
        </div>

        <div class="field">
          <label class="field-label" id="t-zones">Time Zones</label>
          <div class="field-wrap">
            <input class="field-input" id="tz" type="number" placeholder="0" min="0" step="1" />
            <span class="field-unit" id="t-tz-unit">tz</span>
          </div>
        </div>

        <div class="field">
          <label class="field-label" id="t-direction">Travel Vector</label>
          <div class="field-wrap select-wrap">
            <select class="field-input field-select" id="k">
              <option value="1" id="t-west">Westbound — Normal</option>
              <option value="1.5" id="t-east">Eastbound — Heavy</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 12 8" fill="none">
              <path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
        </div>

      </div>

      <!-- CTA -->
      <button class="cta" id="t-button" onclick="analyze()">
        <span class="cta-text">Compute Index</span>
        <svg class="cta-icon" viewBox="0 0 20 20" fill="none">
          <path d="M4 10h12M11 5l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <!-- Result -->
      <div class="result" id="result" aria-live="polite">
        <div class="result-rule"></div>

        <div class="result-meta">
          <span class="result-label" id="t-res-label">ANALYSIS RESULT</span>
          <span class="pulse-dot" id="dot"></span>
        </div>

        <div class="result-display">
          <span class="result-number" id="ivsValue">0.00</span>
          <span class="result-unit">IVS</span>
        </div>

        <div class="result-status" id="status-name"></div>
        <p class="result-desc" id="info"></p>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
