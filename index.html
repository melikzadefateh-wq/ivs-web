<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVS Neural Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="glass-card">
    <h1>Neural Analyzer</h1>
    
    <div class="input-box">
        <label>Flight Time (Hours)</label>
        <input type="number" id="tf" placeholder="00.0">
    </div>

    <div class="input-box">
        <label>Time Zones Crossed</label>
        <input type="number" id="tz" placeholder="0">
    </div>

    <div class="input-box">
        <label>Direction Vector</label>
        <select id="k">
            <option value="1">Westbound (Slow)</option>
            <option value="1.5">Eastbound (Fast)</option>
        </select>
    </div>

    <button onclick="analyze()">Start Analysis</button>

    <div id="result">
        <span id="status" class="status-tag">Result</span>
        <span class="ivs-number" id="ivsValue">0.0</span>
        <p id="info" style="font-size: 13px; opacity: 0.8; line-height: 1.5;"></p>
    </div>
</div>

<script>
    function analyze() {
        const tf = parseFloat(document.getElementById('tf').value);
        const tz = parseFloat(document.getElementById('tz').value);
        const k = parseFloat(document.getElementById('k').value);
        const resDiv = document.getElementById('result');

        if (!tf || isNaN(tz)) return;

        const ivs = k * (tz / tf);
        const valSpan = document.getElementById('ivsValue');
        const statusSpan = document.getElementById('status');
        const info = document.getElementById('info');

        valSpan.innerText = ivs.toFixed(2);
        resDiv.style.display = 'block';

        if (ivs < 0.7) {
            valSpan.className = 'ivs-number good';
            statusSpan.innerText = "System Stable";
            info.innerText = "Biological rhythms are synchronized. Adaptation will be optimal.";
        } else if (ivs <= 1.0) {
            valSpan.className = 'ivs-number warning';
            statusSpan.innerText = "Caution";
            info.innerText = "Mild desynchronization detected. Increase hydration and light exposure.";
        } else {
            valSpan.className = 'ivs-number danger';
            statusSpan.innerText = "Critical Shift";
            info.innerText = "Severe jet lag risk. Artificial melatonin or strict sleep protocol advised.";
        }
    }
</script>
</body>
</html>
