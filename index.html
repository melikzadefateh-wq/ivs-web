<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>IVS Calculator — Твой личный индекс времени</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { color: #005088; text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #334155; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #005088; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #003d66; }
        #result { margin-top: 25px; padding: 15px; border-radius: 10px; text-align: center; display: none; }
        .ivs-value { font-size: 32px; font-weight: bold; display: block; }
        .low { background: #dcfce7; color: #166534; }
        .mid { background: #fef9c3; color: #854d0e; }
        .high { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="card">
    <h1>✈️ IVS Calculator</h1>
    
    <div class="input-group">
        <label>Время полёта (в часах)</label>
        <input type="number" id="tFlight" placeholder="Например: 8">
    </div>

    <div class="input-group">
        <label>Разница поясов (в часах)</label>
        <input type="number" id="tZone" placeholder="Например: 7">
    </div>

    <div class="input-group">
        <label>Направление</label>
        <select id="direction">
            <option value="1">На Запад (k = 1.0)</option>
            <option value="1.5">На Восток (k = 1.5)</option>
        </select>
    </div>

    <button onclick="calculateIVS()">Рассчитать индекс</button>

    <div id="result">
        <span id="resultText">Ваш индекс:</span>
        <span class="ivs-value" id="ivsValue">0</span>
        <p id="desc"></p>
    </div>
</div>

<script>
    function calculateIVS() {
        const tf = parseFloat(document.getElementById('tFlight').value);
        const tz = parseFloat(document.getElementById('tZone').value);
        const k = parseFloat(document.getElementById('direction').value);
        const resDiv = document.getElementById('result');

        if (!tf || !tz) {
            alert("Пожалуйста, введите все данные!");
            return;
        }

        // Твоя формула: k * (tz / tf)
        const ivs = k * (tz / tf);
        const finalIvs = ivs.toFixed(2);

        document.getElementById('ivsValue').innerText = finalIvs;
        resDiv.style.display = 'block';

        const desc = document.getElementById('desc');
        resDiv.className = ''; 

        if (ivs < 0.7) {
            resDiv.classList.add('low');
            desc.innerText = "Всё отлично! Организм легко справится.";
        } else if (ivs <= 1.0) {
            resDiv.classList.add('mid');
            desc.innerText = "Будет небольшая дезориентация. Пей больше воды!";
        } else {
            resDiv.classList.add('high');
            desc.innerText = "Сильный временной сдвиг! Готовься к джетлагу.";
        }
    }
</script>

</body>
</html>
